<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">여행 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

<!-- ============================================================
  HOW TO EXTEND
  ─────────────────────────────────────────────────────────────
  새 여행 추가  : TRIPS 배열에 trip 객체 추가
  인원 추가    : trip.partyOptions 배열에 추가
  일수 추가    : trip.durationOptions + trip.durationDays 에 추가
  공항 추가    : trip.airportOptions 에 추가, days 에 variant 활용
  장소 추가    : day.spots 배열에 spot 객체 추가
  ============================================================ -->

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#18120a;--paper:#faf8f3;--white:#fff;
  --b1:#e2d9cc;--b2:#cec3b3;--b3:#b8aa97;
  --muted:#7e7165;--faint:#ede7dd;
  --gold:#c8a24a;--gold-bg:#fdf6e8;
  --sel-bg:#eaf3fb;--sel-bd:#82bce8;--sel-tx:#1653a0;
  --req-bg:#eaf5ee;--req-bd:#74c79a;--req-tx:#1a6636;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;}
button{font-family:inherit;cursor:pointer;}

/* ── PASSWORD ── */
.pw{position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;align-items:center;justify-content:center;}
.pw-box{text-align:center;padding:40px 36px;background:rgba(255,255,255,.04);border:1px solid rgba(200,162,74,.25);border-radius:12px;width:100%;max-width:340px;}
.pw h2{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:#faf8f3;margin-bottom:5px;}
.pw-sub{font-size:11px;color:var(--gold);letter-spacing:.1em;margin-bottom:26px;}
.pw input{width:100%;padding:11px 14px;font-family:inherit;font-size:14px;background:rgba(255,255,255,.07);border:1px solid rgba(200,162,74,.3);border-radius:6px;color:#faf8f3;outline:none;text-align:center;letter-spacing:.06em;transition:border-color .15s;margin-bottom:10px;}
.pw input:focus{border-color:var(--gold);}
.pw input::placeholder{color:rgba(255,255,255,.25);letter-spacing:0;}
.pw-btn{width:100%;padding:11px;font-family:inherit;font-size:13px;font-weight:700;background:var(--gold);border:none;border-radius:6px;color:var(--ink);cursor:pointer;transition:opacity .12s;}
.pw-btn:hover{opacity:.85;}
.pw-err{font-size:11px;color:#e07070;margin-top:8px;min-height:16px;}

/* ── HEADER ── */
.hdr{background:var(--ink);color:#faf8f3;padding:20px 26px 16px;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.hdr h1{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;line-height:1.35;}
.hdr-sub{font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:.1em;}
.hdr-badge{background:var(--gold);color:var(--ink);padding:4px 12px;font-size:11px;font-weight:700;border-radius:2px;white-space:nowrap;align-self:flex-start;}
.hdr-route{display:flex;align-items:center;gap:7px;margin-top:12px;flex-wrap:wrap;}
.hdr-node{background:rgba(255,255,255,.07);border:1px solid rgba(200,162,74,.3);padding:3px 10px;font-size:11px;border-radius:2px;}
.hdr-arr{color:var(--gold);font-size:12px;}

/* ── CONFIG BAR ── */
.cfg-bar{background:var(--white);border-bottom:2px solid var(--b1);padding:10px 26px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cfg-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;white-space:nowrap;}
.cfg-sep{width:1px;height:20px;background:var(--b1);margin:0 4px;}
.seg{display:flex;border:1px solid var(--b2);border-radius:4px;overflow:hidden;}
.seg button{padding:5px 13px;font-size:12px;font-weight:700;background:transparent;border:none;color:var(--muted);transition:background .1s,color .1s;white-space:nowrap;}
.seg button.on{background:var(--ink);color:var(--white);}
.trip-sel{padding:5px 10px;font-family:inherit;font-size:12px;font-weight:700;border:1px solid var(--b2);border-radius:4px;background:var(--white);color:var(--ink);cursor:pointer;}
.cfg-right{margin-left:auto;display:flex;gap:8px;}
.tb-btn{padding:5px 13px;font-size:12px;font-weight:700;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--muted);transition:background .12s;}
.tb-btn:hover{background:var(--faint);}
.tb-btn.primary{background:var(--gold);border-color:var(--gold);color:var(--ink);}
.tb-btn.primary:hover{opacity:.85;}

/* ── FLIGHT INFO BANNER ── */
.flight-banner{background:var(--gold-bg);border-bottom:1px solid #e8d5a0;padding:8px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:12px;color:#6b4e0a;}
.fl-item{display:flex;align-items:center;gap:5px;}
.fl-item b{font-weight:700;}
.fl-arr{color:#c8a24a;font-weight:700;}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:1fr 310px;align-items:start;}
.col-days{padding:16px 20px;display:flex;flex-direction:column;gap:16px;}
.col-right{padding:16px 18px 16px 4px;position:sticky;top:0;display:flex;flex-direction:column;gap:10px;max-height:100vh;overflow-y:auto;}

/* ── DAY BLOCK ── */
.day-block{background:var(--white);border:1px solid var(--b1);border-radius:8px;overflow:hidden;}
.day-hd{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--b1);}
.day-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.day-hd-info{flex:1;}
.day-hd-title{font-size:13px;font-weight:700;}
.day-hd-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.day-hd-cnt{font-size:10px;color:var(--muted);}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:7px 13px 3px;}
.spots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;padding:3px 11px 11px;}

/* ── SPOT CARD ── */
.spot{border:1px solid var(--b1);border-radius:6px;padding:9px 11px;cursor:pointer;transition:border-color .12s,background .1s;position:relative;}
.spot:hover{border-color:var(--b2);}
.spot.sel{border-color:var(--sel-bd);background:var(--sel-bg);}
.spot.req{border-color:var(--req-bd);background:var(--req-bg);cursor:default;}
.spot.info-only{border-color:var(--b2);background:var(--faint);cursor:default;opacity:.8;}
.spot-chk{position:absolute;top:8px;right:8px;width:15px;height:15px;border-radius:50%;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:8px;background:var(--white);}
.spot.sel .spot-chk{background:var(--sel-bg);border-color:var(--sel-bd);color:var(--sel-tx);}
.spot.req .spot-chk{background:var(--req-bg);border-color:var(--req-bd);color:var(--req-tx);}
.spot-name{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:3px;padding-right:18px;}
.spot.sel .spot-name{color:var(--sel-tx);}
.spot.req .spot-name{color:var(--req-tx);}
.spot-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px;}
.stag{font-size:9px;padding:1px 5px;border-radius:3px;background:var(--faint);color:var(--muted);}
.stag.req{background:var(--req-bg);color:var(--req-tx);}
.stag.info{background:#f0ecff;color:#5a3faa;}
.spot-desc{font-size:10px;color:var(--muted);line-height:1.45;margin-bottom:4px;}
.spot-meta{font-size:9px;color:#a09080;display:flex;gap:5px;flex-wrap:wrap;}

/* ── RIGHT PANEL ── */
.panel{background:var(--white);border:1px solid var(--b1);border-radius:8px;overflow:hidden;}
.panel-hd{padding:9px 13px;border-bottom:1px solid var(--b1);font-size:12px;font-weight:700;}
.panel-bd{padding:9px 13px;}
.itin-day-lbl{font-size:10px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:5px;padding:5px 0 1px;}
.itin-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.itin-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--b1);}
.itin-row:last-child{border-bottom:none;}
.itin-t{font-size:10px;font-weight:700;color:var(--muted);min-width:33px;padding-top:1px;}
.itin-n{font-size:11px;font-weight:700;line-height:1.3;}
.itin-sub{font-size:9px;color:var(--muted);margin-top:1px;}
.itin-empty{font-size:11px;color:var(--muted);padding:6px 0;}
.cost-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--b1);color:var(--muted);}
.cost-row:last-child{border-bottom:none;}
.cost-total{display:flex;justify-content:space-between;font-size:12px;font-weight:700;padding:6px 0 2px;border-top:1.5px solid var(--b2);margin-top:3px;}

/* ── PRINT OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);overflow-y:auto;padding:28px 16px;}
.overlay.open{display:block;}
.psheet{background:var(--white);max-width:680px;margin:0 auto;border-radius:10px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.28);}
.psh{background:var(--ink);color:#faf8f3;padding:20px 26px;}
.psh h2{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;}
.psh-sub{font-size:11px;color:var(--gold);margin-top:3px;letter-spacing:.1em;}
.psh-meta{display:flex;gap:16px;margin-top:11px;flex-wrap:wrap;}
.psh-meta span{font-size:11px;}
.psh-meta b{color:var(--gold);margin-right:3px;}
.pbody{padding:22px 26px;}
.pday{margin-bottom:22px;}
.pday-hd{display:flex;align-items:center;gap:9px;padding-bottom:8px;margin-bottom:10px;border-bottom:2px solid;}
.pday-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pday-label{font-size:14px;font-weight:700;}
.pday-date{margin-left:auto;font-size:11px;color:var(--muted);}
.pspot{display:flex;border:1px solid var(--b1);border-radius:5px;overflow:hidden;margin-bottom:6px;}
.pspot-time{min-width:56px;padding:10px 5px;background:var(--faint);border-right:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0;text-align:center;}
.pspot-body{padding:9px 13px;flex:1;}
.pspot-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.pspot-req{font-size:9px;color:var(--req-tx);font-weight:400;margin-left:4px;}
.pspot-info{font-size:10px;color:var(--muted);line-height:1.5;}
.pspot-cost{font-size:10px;font-weight:700;color:var(--req-tx);margin-top:2px;}
.pnight{font-size:10px;color:var(--muted);padding:5px 10px;background:var(--faint);border-radius:3px;margin-top:5px;}
.pflight{font-size:10px;color:#6b4e0a;padding:6px 10px;background:var(--gold-bg);border:1px solid #e8d5a0;border-radius:4px;margin-bottom:8px;}
.pcost{margin-top:18px;border:1px solid var(--b1);border-radius:7px;overflow:hidden;}
.pcost-row{display:flex;justify-content:space-between;padding:7px 14px;font-size:11px;border-bottom:1px solid var(--b1);color:var(--muted);}
.pcost-row:last-child{border-bottom:none;}
.pcost-total{display:flex;justify-content:space-between;padding:10px 14px;font-size:13px;font-weight:700;background:var(--ink);color:#faf8f3;}
.pactions{padding:12px 26px;border-top:1px solid var(--b1);display:flex;gap:8px;align-items:center;background:var(--paper);}
.pnote{font-size:10px;color:var(--muted);flex:1;line-height:1.6;}
.pbtn{padding:7px 14px;font-family:inherit;font-size:12px;font-weight:700;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--muted);cursor:pointer;}
.pbtn:hover{background:var(--faint);}
.pbtn.primary{background:var(--ink);border-color:var(--ink);color:var(--white);}

@media(max-width:720px){
  .layout{grid-template-columns:1fr;}
  .col-right{position:static;max-height:none;padding:0 14px 20px;}
  .spots-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:440px){.spots-grid{grid-template-columns:1fr;}}
@media print{
  body>*:not(.overlay){display:none!important;}
  .overlay{display:block!important;position:static!important;background:none!important;padding:0!important;overflow:visible!important;}
  .psheet{box-shadow:none!important;border-radius:0!important;max-width:100%!important;}
  .pactions{display:none!important;}
  @page{margin:14mm;}
}
</style>
</head>
<body>

<!-- ── PASSWORD ────────────────────────────────────────────── -->
<div class="pw" id="pwScreen">
  <div class="pw-box">
    <h2>가족 여행 플래너</h2>
    <div class="pw-sub">Family Travel Planner</div>
    <input type="password" id="pwInput" placeholder="비밀번호를 입력하세요"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button class="pw-btn" onclick="checkPw()">입장</button>
    <div class="pw-err" id="pwErr"></div>
  </div>
</div>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<div class="hdr">
  <div class="hdr-top">
    <div>
      <h1 id="hdrTitle"></h1>
      <div class="hdr-sub" id="hdrSub"></div>
    </div>
    <div class="hdr-badge" id="hdrBadge"></div>
  </div>
  <div class="hdr-route" id="hdrRoute"></div>
</div>

<!-- ── CONFIG BAR ──────────────────────────────────────────── -->
<div class="cfg-bar">
  <span class="cfg-label">여행</span>
  <select class="trip-sel" id="tripSel" onchange="switchTrip(this.value)"></select>
  <div class="cfg-sep"></div>
  <span class="cfg-label">일정</span>
  <div class="seg" id="durSeg"></div>
  <div class="cfg-sep"></div>
  <span class="cfg-label">인원</span>
  <div class="seg" id="partySeg"></div>
  <div class="cfg-sep"></div>
  <span class="cfg-label">출발지</span>
  <div class="seg" id="depSeg"></div>
  <div class="cfg-sep"></div>
  <span class="cfg-label">귀국편</span>
  <div class="seg" id="airportSeg"></div>
  <div class="cfg-right">
    <button class="tb-btn" onclick="resetSelections()">↺ 초기화</button>
    <button class="tb-btn primary" onclick="openPrint()">🖨️ 출력 / PDF</button>
  </div>
</div>

<!-- ── FLIGHT BANNER ───────────────────────────────────────── -->
<div class="flight-banner" id="flightBanner"></div>

<!-- ── MAIN LAYOUT ─────────────────────────────────────────── -->
<div class="layout">
  <div class="col-days" id="colDays"></div>
  <div class="col-right">
    <div class="panel">
      <div class="panel-hd" id="itinHead">선택 일정</div>
      <div class="panel-bd" id="itinBody"></div>
    </div>
    <div class="panel">
      <div class="panel-hd">예상 비용</div>
      <div class="panel-bd" id="costBody"></div>

</div>

<!-- ── PRINT OVERLAY ───────────────────────────────────────── -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closePrint()">
  <div class="psheet">
    <div class="psh">
      <h2 id="pTitle"></h2>
      <div class="psh-sub" id="pSub"></div>
      <div class="psh-meta">
        <span id="pM1"></span><span id="pM2"></span>
        <span id="pM3"></span><span id="pM4"></span>
      </div>
    </div>
    <div class="pbody" id="pbody"></div>
    <div class="pactions">
      <div class="pnote">인쇄창에서 <b>대상 → PDF로 저장</b>을 선택하면 PDF로 저장됩니다.</div>
      <button class="pbtn" onclick="closePrint()">닫기</button>
      <button class="pbtn primary" onclick="window.print()">🖨️ 인쇄 / PDF</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   PASSWORD
═══════════════════════════════════════════════════════════ */
// SHA-256 해시로 비밀번호 검증 — 코드에 원문 비밀번호가 노출되지 않습니다
// 비밀번호를 바꾸려면: https://emn178.github.io/online-tools/sha256.html 에서
// 새 비밀번호의 해시값을 구한 뒤 아래 PW_HASH 값을 교체하세요
const PW_HASH = 'bd13d5a0906be48ef7377331f9af5ae9d641fd39ab9f16f8bcedbfa234beb162';

async function checkPw(){
  const val = document.getElementById('pwInput').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hash === PW_HASH){
    document.getElementById('pwScreen').style.display='none';
    sessionStorage.setItem('trip_auth','1');
  } else {
    document.getElementById('pwErr').textContent='비밀번호가 올바르지 않습니다';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>document.getElementById('pwErr').textContent='',2000);
  }
}
if(sessionStorage.getItem('trip_auth')==='1'){
  document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('pwScreen').style.display='none';
  });
}

/* ═══════════════════════════════════════════════════════════
   TRIP DATA
   ─────────────────────────────────────────────────────────
   trip 객체 구조:
   {
     id, title, subtitle,
     durationOptions: [{label, value}]   // 2박3일, 3박4일 등
     durationDays: { '3d': [...days], '4d': [...days] }
       각 days 배열은 day 객체들:
       { label, title, date, color, night,
         variants: { default, fukuoka, kitakyushu }  // 공항 variant
         spots: [{ id, name, required, infoOnly,
                   tags, desc, duration,
                   costs: {partyValue: number},
                   itin: {time, note} }] }
     partyOptions: [{label, value}]
     departureOptions: [{label, value, flightInfo}]
     airportOptions: [{label, value, desc}]  // 귀국 공항
     flightInfo: (dep, airport) => ({go, back})  // 항공편 정보 함수
     fixedCosts: [{label, costs:{partyVal: number}}]
   }
═══════════════════════════════════════════════════════════ */

const TRIPS = [

/* ──────────────────────────────────────────────────────────
   여행 1 : 히로시마 · 미야지마 · 시모노세키
────────────────────────────────────────────────────────── */
{
  id: 'hiroshima',
  title: '히로시마 · 미야지마 · 시모노세키',
  subtitle: '성 & 역사 집중 코스',

  durationOptions: [
    { label: '2박3일', value: '3d' },
    { label: '3박4일', value: '4d' },
  ],

  partyOptions: [
    { label: '👫 2인', value: '2' },
    { label: '👨‍👩‍👧‍👦 4인', value: '4' },
    { label: '🏠 5인', value: '5' },
  ],

  departureOptions: [
    { label: '✈ 인천', value: 'ICN', airport: '인천국제공항 → 히로시마공항' },
    { label: '✈ 김포', value: 'GMP', airport: '김포공항 → 히로시마공항' },
    { label: '✈ 김해', value: 'PUS', airport: '김해국제공항 → 후쿠오카공항' },
  ],

  airportOptions: [
    { label: '후쿠오카', value: 'FUK', desc: '시모노세키→후쿠오카 이동 후 귀국 (약 1.5시간)' },
    { label: '기타큐슈', value: 'KKJ', desc: '시모노세키에서 가장 가까운 공항 (약 40분)' },
  ],

  flightInfo(dep, airport) {
    const go = {
      ICN: '인천 → 히로시마 (약 1시간 50분)',
      GMP: '김포 → 히로시마 (약 1시간 50분)',
      PUS: '김해 → 후쿠오카 (약 1시간) → 신칸센 이동',
    }[dep] || '';
    const back = {
      FUK: '시모노세키 → 후쿠오카공항 (버스/기차 약 1.5시간) → 귀국',
      KKJ: '시모노세키 → 기타큐슈공항 (버스 약 40분) → 귀국',
    }[airport] || '';
    return { go, back };
  },

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
const S = {
  tripIdx: 0,
  duration: null,
  party: null,
  departure: null,
  airport: null,
  selected: new Set(),
};

function T()   { return TRIPS[S.tripIdx]; }
function dur() { return S.duration || T().durationOptions[0].value; }
function pty() { return S.party    || T().partyOptions[0].value; }
function dep() { return S.departure|| T().departureOptions[0].value; }
function apt() { return S.airport  || T().airportOptions[0].value; }
function days(){ return T().durationDays[dur()]; }

function initTrip(idx){
  S.tripIdx = idx;
  const t = T();
  S.duration  = t.durationOptions[0].value;
  S.party     = t.partyOptions[0].value;
  S.departure = t.departureOptions[0].value;
  S.airport   = t.airportOptions[0].value;
  S.selected  = new Set();
  resetDefaults();
}

function resetDefaults(){
  S.selected = new Set();
  days().forEach(d => d.spots.forEach(s => {
    if(s.required) S.selected.add(s.id);
  }));
  const defaults = ['karato','daishoin','miyajima_lunch','nagoya_meshi','jokamachi'];
  defaults.forEach(id => S.selected.add(id));
}

// airportVariant 필터: 공항 선택에 따라 해당 variant 장소만 표시
function isAirportMatch(s){
  if(!s.airportVariant) return true;          // variant 없으면 항상 표시
  return s.airportVariant === apt();           // 선택한 공항과 일치하면 표시
}
function isActive(s){ return s.required || S.selected.has(s.id); }
function activeSpots(d){ return d.spots.filter(s => isAirportMatch(s) && isActive(s)); }
function visibleSpots(d){ return d.spots.filter(isAirportMatch); }  // 카드 렌더링용
function spotCost(s){ return s.costs[pty()] ?? 0; }
function fmt(n){ return n===0 ? '무료' : `¥${n.toLocaleString()}`; }

function el(tag,cls,html){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}

/* ═══════════════════════════════════════════════════════════
   RENDER FUNCTIONS
═══════════════════════════════════════════════════════════ */
function renderAll(){
  renderHeader(); renderCfg(); renderFlightBanner();
  renderDays(); renderItin(); renderCost();
}

function renderHeader(){
  const t=T();
  document.getElementById('pageTitle').textContent = t.title+' 여행 플래너';
  document.getElementById('hdrTitle').textContent  = t.title;
  document.getElementById('hdrSub').textContent    = t.subtitle;
  const d = T().durationOptions.find(x=>x.value===dur());
  document.getElementById('hdrBadge').textContent  = d ? d.label : '';

  const dep_info = T().departureOptions.find(x=>x.value===dep());
  const apt_info = T().airportOptions.find(x=>x.value===apt());
  const route = document.getElementById('hdrRoute');
  route.innerHTML='';
  const nodes = [
    dep_info ? dep_info.airport.split('→')[0].trim() : '',
    ...days().map(d=>d.title).filter(Boolean),
    apt_info ? apt_info.label+'공항' : '',
  ].filter(Boolean);
  nodes.forEach((n,i)=>{
    route.appendChild(el('span','hdr-node',n));
    if(i<nodes.length-1) route.appendChild(el('span','hdr-arr','→'));
  });
}

function makeSeg(id, options, current, onChange){
  const seg=document.getElementById(id);
  seg.innerHTML='';
  options.forEach(o=>{
    const btn=el('button', current===o.value?'on':'', o.label);
    btn.onclick=()=>{ onChange(o.value); renderAll(); };
    seg.appendChild(btn);
  });
}

function renderCfg(){
  const t=T();
  const sel=document.getElementById('tripSel');
  sel.innerHTML='';
  TRIPS.forEach((tr,i)=>{
    const opt=document.createElement('option');
    opt.value=i; opt.textContent=tr.title;
    if(i===S.tripIdx) opt.selected=true;
    sel.appendChild(opt);
  });

  makeSeg('durSeg',    t.durationOptions,   dur(),  v=>{ S.duration=v; resetDefaults(); });
  makeSeg('partySeg',  t.partyOptions,      pty(),  v=>S.party=v);
  makeSeg('depSeg',    t.departureOptions,  dep(),  v=>S.departure=v);
  makeSeg('airportSeg',t.airportOptions,    apt(),  v=>S.airport=v);
}

function renderFlightBanner(){
  const t  = T();
  const fi = t.flightInfo(dep(), apt());
  const depInfo = t.departureOptions.find(x=>x.value===dep());
  const aptInfo = t.airportOptions.find(x=>x.value===apt());
  const banner  = document.getElementById('flightBanner');

  if(!fi.go && !fi.back){ banner.style.display='none'; return; }
  banner.style.display='flex';
  banner.innerHTML = `
    <span class="fl-item">✈️ <b>가는 편</b>${fi.go}</span>
    <span class="fl-arr">|</span>
    <span class="fl-item">🛬 <b>오는 편</b>${fi.back}</span>
    ${aptInfo ? `<span class="fl-arr">|</span><span class="fl-item">💡 ${aptInfo.desc}</span>` : ''}
  `;
}

function renderDays(){
  const col=document.getElementById('colDays'); col.innerHTML='';
  days().forEach(day=>{
    const cnt=activeSpots(day).length;
    const block=el('div','day-block');
    block.innerHTML=`<div class="day-hd">
      <div class="day-dot" style="background:${day.color}"></div>
      <div class="day-hd-info">
        <div class="day-hd-title">${day.label}&ensp;·&ensp;${
          // 귀국일(night===null)이고 히로시마 여행이면 공항명 반영
          (day.night===null && T().airportOptions.length>1)
            ? day.title + ' (' + (T().airportOptions.find(x=>x.value===apt())?.label||'') + '공항)'
            : day.title
        }</div>
        <div class="day-hd-sub">${day.date}${day.night?'&ensp;→&ensp;'+day.night:''}</div>
      </div>
      <div class="day-hd-cnt">${cnt}곳 선택</div>
    </div>`;

    // 귀국 공항 선택에 맞는 장소만 필터링
    const visible=visibleSpots(day);
    const req=visible.filter(s=>s.required);
    const opt=visible.filter(s=>!s.required&&!s.infoOnly);
    const info=visible.filter(s=>s.infoOnly);

    if(req.length){
      block.appendChild(el('div','sec-lbl','필수'));
      const g=el('div','spots-grid');
      req.forEach(s=>g.appendChild(makeCard(s)));
      block.appendChild(g);
    }
    if(opt.length){
      block.appendChild(el('div','sec-lbl','선택'));
      const g=el('div','spots-grid');
      opt.forEach(s=>g.appendChild(makeCard(s)));
      block.appendChild(g);
    }
    if(info.length){
      block.appendChild(el('div','sec-lbl','이동 정보'));
      const g=el('div','spots-grid');
      info.forEach(s=>g.appendChild(makeCard(s)));
      block.appendChild(g);
    }
    col.appendChild(block);
  });
}

function makeCard(s){
  const on=isActive(s);
  const isInfo=s.infoOnly;
  const cls=`spot${isInfo?' info-only':on?(s.required?' req':' sel'):''}`;
  const c=el('div',cls);
  const cost=spotCost(s);
  const tags=s.tags.map(t=>`<span class="stag${s.required?' req':isInfo?' info':''}">${t}</span>`).join('');

  c.innerHTML=`
    ${!isInfo?`<div class="spot-chk">${on?'✓':''}</div>`:''}
    <div class="spot-name">${s.name}</div>
    <div class="spot-tags">${tags}</div>
    <div class="spot-desc">${s.desc}</div>
    <div class="spot-meta"><span>${s.duration}</span><span>${isInfo?'':fmt(cost)+'/'+pty()+'인'}</span></div>`;

  if(!s.required&&!isInfo){
    c.onclick=()=>{
      if(S.selected.has(s.id)) S.selected.delete(s.id);
      else S.selected.add(s.id);
      renderAll();
    };
  }
  return c;
}

function renderItin(){
  const body=document.getElementById('itinBody'); body.innerHTML='';
  let count=0;
  days().forEach(day=>{
    const spots=activeSpots(day); if(!spots.length) return;
    count+=spots.length;
    body.appendChild(el('div','itin-day-lbl',
      `<span class="itin-dot" style="background:${day.color}"></span>${day.label} · ${day.title}`));
    spots.forEach(s=>{
      const cost=spotCost(s);
      const row=el('div','itin-row');
      row.innerHTML=`<div class="itin-t">${s.itin.time}</div><div>
        <div class="itin-n">${s.name}</div>
        <div class="itin-sub">${s.itin.note}${!s.infoOnly?' · '+fmt(cost):''}</div></div>`;
      body.appendChild(row);
    });
  });
  if(!count) body.innerHTML='<div class="itin-empty">장소를 선택하면 일정이 나타납니다</div>';
  document.getElementById('itinHead').textContent=`선택 일정 (${count}곳)`;
}

function renderCost(){
  const body=document.getElementById('costBody'); body.innerHTML='';
  const t=T();
  let spotTotal=0;
  days().forEach(d=>activeSpots(d).forEach(s=>{ if(!s.infoOnly) spotTotal+=spotCost(s); }));
  let fixedTotal=0;
  const rows=[{label:'입장료 합계',val:spotTotal}];
  t.fixedCosts.forEach(fc=>{
    const val=fc.costs[pty()]??0; fixedTotal+=val;
    rows.push({label:fc.label,val});
  });
  const total=spotTotal+fixedTotal;
  rows.forEach(r=>body.appendChild(el('div','cost-row',
    `<span>${r.label}</span><span>¥${r.val.toLocaleString()}</span>`)));
  body.appendChild(el('div','cost-total',
    `<span>합계 (${pty()}인)</span><span>¥${total.toLocaleString()}</span>`));
}

function openPrint(){ buildPrint(); document.getElementById('overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closePrint(){ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }

function buildPrint(){
  const t=T();
  let spotTotal=0;
  days().forEach(d=>activeSpots(d).forEach(s=>{ if(!s.infoOnly) spotTotal+=spotCost(s); }));
  const cnt=days().flatMap(d=>activeSpots(d)).length;
  const dOpt=t.durationOptions.find(x=>x.value===dur());
  const fi=t.flightInfo(dep(),apt());

  document.getElementById('pTitle').textContent = t.title+' 여행 일정표';
  document.getElementById('pSub').textContent   = t.subtitle;
  document.getElementById('pM1').innerHTML = `<b>📅</b>${dOpt?dOpt.label:''}`;
  document.getElementById('pM2').innerHTML = `<b>👥</b>${pty()}인`;
  document.getElementById('pM3').innerHTML = `<b>📍</b>총 ${cnt}곳`;
  document.getElementById('pM4').innerHTML = fi.go ? `<b>✈️</b>${fi.go.split('(')[0].trim()}` : '';

  const body=document.getElementById('pbody'); body.innerHTML='';

  if(fi.go||fi.back){
    body.appendChild(el('div','pflight',
      `✈️ ${fi.go}${fi.back?' &ensp;|&ensp; 🛬 '+fi.back:''}`));
  }

  days().forEach(day=>{
    const spots=activeSpots(day);
    const div=el('div','pday');
    div.innerHTML=`<div class="pday-hd" style="border-color:${day.color}">
      <div class="pday-dot" style="background:${day.color}"></div>
      <div class="pday-label" style="color:${day.color}">${day.label}&ensp;·&ensp;${day.title}</div>
      <div class="pday-date">${day.date}</div></div>`;

    if(!spots.length) div.appendChild(el('div','','<span style="font-size:11px;color:#7e7165">선택된 장소 없음</span>'));

    spots.forEach(s=>{
      const cost=spotCost(s);
      const sd=el('div','pspot');
      sd.innerHTML=`<div class="pspot-time">${s.itin.time}</div>
        <div class="pspot-body">
          <div class="pspot-name">${s.name}${s.required?'<span class="pspot-req">(필수)</span>':''}</div>
          <div class="pspot-info">${s.itin.note} · ${s.duration}</div>
          <div class="pspot-cost">${s.infoOnly?'이동':cost===0?'무료':'¥'+cost.toLocaleString()+'/'+pty()+'인'}</div>
        </div>`;
      div.appendChild(sd);
    });
    if(day.night) div.appendChild(el('div','pnight','🏨 '+day.night));
    body.appendChild(div);
  });

  let fixedTotal=0;
  const ct=el('div','pcost');
  let html=`<div class="pcost-row"><span>입장료 합계</span><span>¥${spotTotal.toLocaleString()}</span></div>`;
  t.fixedCosts.forEach(fc=>{ const v=fc.costs[pty()]??0; fixedTotal+=v; html+=`<div class="pcost-row"><span>${fc.label}</span><span>¥${v.toLocaleString()}</span></div>`; });
  html+=`<div class="pcost-total"><span>총 예상 비용 (${pty()}인)</span><span>¥${(spotTotal+fixedTotal).toLocaleString()}</span></div>`;
  ct.innerHTML=html; body.appendChild(ct);
}

/* ═══════════════════════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════════════════════ */
function switchTrip(idx){ initTrip(parseInt(idx)); renderAll(); }
function resetSelections(){ if(!confirm('초기화할까요?')) return; resetDefaults(); renderAll(); }

/* ── BOOT ── */
initTrip(0);
renderAll();
</script>
